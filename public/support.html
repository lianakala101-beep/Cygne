<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <title>Support · Cygne</title>
  <meta name="description" content="Get help with Cygne — email hello@cygne.skin.">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: #ffffff;
      color: #1c1c1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    .header {
      border-bottom: 1px solid #e5e3dc;
      padding: 24px 0;
    }
    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .header a {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .header img {
      height: 32px;
      width: auto;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0 0 24px;
      color: #1c1c1a;
    }
    h2 {
      font-size: 20px;
      font-weight: 700;
      margin: 40px 0 12px;
      color: #1c1c1a;
    }
    p { margin: 0 0 16px; }
    ul {
      margin: 0 0 16px;
      padding-left: 24px;
    }
    li { margin-bottom: 6px; }
    a { color: #2d3d2b; }
    a:hover { text-decoration: none; }
    .footer {
      border-top: 1px solid #e5e3dc;
      padding: 32px 0;
      text-align: center;
      font-size: 14px;
      color: #7a7a7a;
    }
    .footer a { color: #2d3d2b; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="https://cygne.skin" aria-label="Cygne home">
        <img src="/cygne-logo.png" alt="Cygne">
      </a>
    </div>
  </header>

  <main>
    <h1>Support</h1>

    <p>For help with Cygne, email us at <a href="mailto:hello@cygne.skin">hello@cygne.skin</a>.</p>

    <p>We typically respond within 1&ndash;2 business days.</p>

    <h2>Common topics</h2>
    <ul>
      <li>Account and login issues</li>
      <li>Data and privacy questions</li>
      <li>Feature questions</li>
      <li>Billing and subscription</li>
    </ul>
  </main>

  <footer class="footer">
    <p>
      <a href="mailto:hello@cygne.skin">hello@cygne.skin</a>
      <span style="margin: 0 8px;">|</span>
      <a href="https://cygne.skin">cygne.skin</a>
    </p>
  </footer>
</body>
</html>
