name: Deploy Edge Functions

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Drop local Supabase config
        # The committed supabase/config.toml uses a [project] table that the
        # current CLI schema rejects ("'config.config' has invalid keys:
        # project"), which aborts every deploy. The deploys below are fully
        # standalone — they target the project via --project-ref and
        # authenticate with SUPABASE_ACCESS_TOKEN — so remove the local config
        # on the runner so the CLI never parses it. (Runner checkout only; the
        # repo file is unaffected.)
        run: rm -f supabase/config.toml

      - name: Deploy ask-cygne
        run: supabase functions deploy ask-cygne --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Deploy swan-sense-daily
        run: supabase functions deploy swan-sense-daily --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Deploy rapid-action
        run: supabase functions deploy rapid-action --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt
