name: Deploy Edge Functions

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned rather than `latest` — the setup-cli action resolves
          # `latest` via the GitHub API and hits anonymous-rate-limit
          # errors on busy runners. Bump this when we want a new CLI.
          version: 2.45.5

      # NOTE: supabase/config.toml is intentionally NOT removed anymore. With
      # the invalid [project] key gone, the CLI parses it cleanly and applies
      # the per-function `verify_jwt = false` settings — which persist the
      # gateway setting reliably, unlike the --no-verify-jwt flag (ignored on
      # function updates, supabase/cli#4059). The flags below are kept as
      # belt-and-suspenders.

      - name: Deploy ask-cygne
        run: supabase functions deploy ask-cygne --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Deploy swan-sense-daily
        run: supabase functions deploy swan-sense-daily --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt

      - name: Deploy rapid-action
        run: supabase functions deploy rapid-action --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt
